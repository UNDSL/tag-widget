<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
 font-family: Arial, Helvetica, sans-serif;
 padding: 15px;
 background:#f5f5f5;
}

h3{
 margin-top:0;
}

.tag-container{
 display:flex;
 flex-wrap:wrap;
}

.tag{
 padding:8px 14px;
 margin:6px;
 border-radius:20px;
 background:#e0e0e0;
 cursor:pointer;
 font-size:13px;
}

.tag.active{
 background:#007AA3;
 color:white;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div class="tag-container" id="tagContainer"></div>

<script>

const tagList = [
"Complaint",
"Billing Issue",
"Technical Issue",
"Abuse Report",
"General Inquiry",
"Follow Up Required",
"Service Delay",
"Information Request"
];

let selectedTags = [];

function renderTags(){

const container = document.getElementById("tagContainer");

tagList.forEach(tag => {

const div = document.createElement("div");

div.className = "tag";
div.innerText = tag;

div.onclick = function(){
 toggleTag(tag, div);
};

container.appendChild(div);

});

}

function toggleTag(tag, element){

if(selectedTags.includes(tag)){
 selectedTags = selectedTags.filter(t => t !== tag);
 element.classList.remove("active");
}
else{
 selectedTags.push(tag);
 element.classList.add("active");
}

saveTags();

}

function saveTags(){

let value = selectedTags.join(",");

console.log("Saving Tags:", value);

if(window.desktopAgent){
 window.desktopAgent.updateTask({
  Call_Tags: value
 });
}

}

renderTags();

</script>

</body>
</html>
