<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Tags Widget</title>
  <script type="module" crossorigin src="/assets/index-CVLXQwOs.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B-wxQKKz.css">
</head>
<body>
  <div class="card">
    <h3>Call Tags</h3>
    <p>Select a tag. The widget will save it automatically to <b>Call_Tags</b>.</p>

    <div class="btn-grid">
      <button data-tag="Neglect">Neglect</button>
      <button data-tag="Physical Abuse">Physical Abuse</button>
      <button data-tag="Sexual Abuse">Sexual Abuse</button>
      <button data-tag="Emotional Abuse">Emotional Abuse</button>
      <button data-tag="General Concern">General Concern</button>
      <button data-tag="Other">Other</button>
    </div>

    <div id="status" class="status info">Initializing widget...</div>

    <div class="meta">
      <div><b>Interaction ID:</b> <span id="interactionId">Not found</span></div>
      <div><b>Saved Tag:</b> <span id="savedTag">None</span></div>
    </div>
  </div>

</body>
</html>
