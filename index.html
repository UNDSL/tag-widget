<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
 font-family: Arial, Helvetica, sans-serif;
 padding:15px;
 background:#f5f5f5;
}

h3{
 margin-top:0;
}

.tag-container{
 display:flex;
 flex-wrap:wrap;
}

.tag{
 padding:8px 14px;
 margin:6px;
 border-radius:20px;
 background:#e0e0e0;
 cursor:pointer;
 font-size:13px;
 transition:all .2s;
}

.tag:hover{
 background:#d2d2d2;
}

.tag.active{
 background:#007AA3;
 color:white;
}

.status{
 margin-top:10px;
 font-size:12px;
 color:#666;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div class="tag-container" id="tagContainer"></div>

<div class="status" id="status">
No tags selected
</div>

<script>

const tagList = [
"Complaint",
"Billing Issue",
"Technical Issue",
"Abuse Report",
"General Inquiry",
"Follow Up Required",
"Service Delay",
"Information Request"
]

let selectedTags = []

function renderTags(){

const container = document.getElementById("tagContainer")

tagList.forEach(tag => {

const div = document.createElement("div")

div.className="tag"
div.innerText=tag

div.onclick = function(){
 toggleTag(tag, div)
}

container.appendChild(div)

})

}

function toggleTag(tag, element){

if(selectedTags.includes(tag)){

 selectedTags = selectedTags.filter(t => t !== tag)
 element.classList.remove("active")

}else{

 selectedTags.push(tag)
 element.classList.add("active")

}

updateStatus()
saveTags()

}

function updateStatus(){

const status = document.getElementById("status")

if(selectedTags.length === 0){
 status.innerText = "No tags selected"
}else{
 status.innerText = "Selected: " + selectedTags.join(", ")
}

}

function saveTags(){

let value = selectedTags.join(",")

console.log("Saving Tags:", value)

try{

 if(window.agentx){

  window.agentx.updateTask({
   Call_Tags: value
  })

  console.log("Tags sent to interaction")

 }else{

  console.log("AgentX SDK not detected (normal if testing in browser)")

 }

}catch(e){

 console.log("Error sending tags:", e)

}

}

renderTags()

</script>

</body>
</html>
