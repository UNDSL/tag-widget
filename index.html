<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://unpkg.com/@cisco/agentx-sdk@latest/dist/agentx-sdk.js"></script>

<style>

body{
 font-family: Arial;
 padding:15px;
 background:#f5f5f5;
}

.tag-container{
 display:flex;
 flex-wrap:wrap;
}

.tag{
 padding:8px 14px;
 margin:6px;
 border-radius:20px;
 background:#e0e0e0;
 cursor:pointer;
}

.tag.active{
 background:#007AA3;
 color:white;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div id="tags" class="tag-container"></div>

<script>

const tagList = [
"Complaint",
"Billing Issue",
"Technical Issue",
"Abuse Report",
"General Inquiry"
]

let selectedTags = []

const agentx = new AgentX()

agentx.init()

function renderTags(){

const container = document.getElementById("tags")

tagList.forEach(tag => {

const div = document.createElement("div")

div.className = "tag"
div.innerText = tag

div.onclick = () => toggleTag(tag, div)

container.appendChild(div)

})

}

function toggleTag(tag, element){

if(selectedTags.includes(tag)){

 selectedTags = selectedTags.filter(t => t !== tag)
 element.classList.remove("active")

}else{

 selectedTags.push(tag)
 element.classList.add("active")

}

saveTags()

}

function saveTags(){

let value = selectedTags.join(",")

console.log("Saving:", value)

agentx.updateTask({
 Call_Tags: value
})

}

renderTags()

</script>

</body>

</html>
