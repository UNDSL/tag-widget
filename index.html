<!DOCTYPE html>
<html>
<head>

<script src="https://unpkg.com/@wxcc-desktop/sdk"></script>

<style>

body{
font-family: Arial;
padding:15px;
}

.tag{
display:inline-block;
padding:8px 12px;
margin:5px;
background:#0f62fe;
color:white;
border-radius:20px;
cursor:pointer;
}

.tag:hover{
background:#0043ce;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div class="tag" onclick="setTag('Physical Abuse')">Physical Abuse</div>
<div class="tag" onclick="setTag('Neglect')">Neglect</div>
<div class="tag" onclick="setTag('Sexual Abuse')">Sexual Abuse</div>
<div class="tag" onclick="setTag('Emergency')">Emergency</div>
<div class="tag" onclick="setTag('False Report')">False Report</div>

<script>

let desktop;

window.onload = async function(){

desktop = new window.Desktop.default();
await desktop.init();

}

function setTag(tag){

desktop.actions.setVariable({
variableName: "Call_Tags",
value: tag
});

}

</script>

</body>
</html>
