<!DOCTYPE html>
<html>
<head>

<script type="module">

import { Desktop } from "https://cdn.jsdelivr.net/npm/@wxcc-desktop/sdk/dist/index.js";

Desktop.config.init();

function setTag(tag){

    const contact = Desktop.store.agentContact;

    if(!contact){
        console.log("No active contact");
        return;
    }

    Desktop.actions.updateContact({
        data:{
            callAssociatedData:{
                Call_Tags: tag
            }
        }
    });

}

window.setTag = setTag;

</script>

<style>

body{
font-family: Arial;
padding:15px;
}

.tag{
display:inline-block;
padding:8px 14px;
margin:6px;
background:#0f62fe;
color:white;
border-radius:20px;
cursor:pointer;
}

.tag:hover{
background:#0043ce;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div class="tag" onclick="setTag('Neglect')">Neglect</div>
<div class="tag" onclick="setTag('Physical Abuse')">Physical Abuse</div>
<div class="tag" onclick="setTag('Sexual Abuse')">Sexual Abuse</div>
<div class="tag" onclick="setTag('Emergency')">Emergency</div>

</body>
</html>
