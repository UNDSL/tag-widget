<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Tags Widget</title>
  <link rel="stylesheet" crossorigin href="/tag-widget/assets/index-CuiLSHJq.css">
</head>
<body>
  <div class="card">
    <h3>Call Tags</h3>
    <p>Select a tag. The widget will send it to the desktop listener automatically.</p>

    <div class="btn-grid">
      <button data-tag="Neglect">Neglect</button>
      <button data-tag="Physical Abuse">Physical Abuse</button>
      <button data-tag="Sexual Abuse">Sexual Abuse</button>
      <button data-tag="Emotional Abuse">Emotional Abuse</button>
      <button data-tag="General Concern">General Concern</button>
      <button data-tag="Other">Other</button>
    </div>

    <div id="status" class="status info">Ready</div>

    <div class="meta">
      <div><b>Selected Tag:</b> <span id="selectedTag">None</span></div>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
