<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
 font-family: Arial;
 padding:20px;
}

.tag{
 display:inline-block;
 padding:10px 16px;
 margin:6px;
 background:#e0e0e0;
 border-radius:20px;
 cursor:pointer;
 transition:0.2s;
}

.tag:hover{
 background:#d5d5d5;
}

.tag.active{
 background:#007aa3;
 color:white;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div id="tags"></div>

<script src="https://unpkg.com/@wxcc-desktop/sdk@latest/dist/index.js"></script>

<script>

let activeTask = null
let selectedTags = []

const tags = [
"Complaint",
"Billing Issue",
"Technical Issue",
"Abuse Report",
"General Inquiry",
"Follow Up Required",
"Service Delay",
"Information Request"
]

const container = document.getElementById("tags")

/* Render Tags */

tags.forEach(tag => {

 const div = document.createElement("div")

 div.className="tag"
 div.innerText = tag

 div.onclick = () => toggleTag(tag,div)

 container.appendChild(div)

})

/* Toggle Tag */

function toggleTag(tag,element){

 if(selectedTags.includes(tag)){

  selectedTags = selectedTags.filter(t => t !== tag)
  element.classList.remove("active")

 }else{

  selectedTags.push(tag)
  element.classList.add("active")

 }

 saveTags()

}

/* Save Tags to Call Variable */

function saveTags(){

 if(!activeTask){
  console.log("No active call yet")
  return
 }

 const tagString = selectedTags.join(",")

 console.log("Saving Tags:", tagString)

 window.wxcc.agent.updateCallVariables({
  interactionId: activeTask.interactionId,
  variables:{
   Call_Tags: tagString
  }
 })

}

/* Detect Active Interaction */

window.addEventListener("load", async () => {

 try{

  const task = await window.wxcc.agent.getActiveTask()

  activeTask = task

  console.log("Active interaction detected:", task)

 }catch(e){

  console.log("No active task yet")

 }

})

</script>

</body>
</html>
