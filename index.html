<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
 font-family: Arial;
 padding:20px;
}

.tag{
 display:inline-block;
 padding:10px;
 margin:5px;
 background:#e0e0e0;
 border-radius:20px;
 cursor:pointer;
}

</style>

</head>

<body>

<h3>Call Tags</h3>

<div id="tags"></div>

<script>

console.log("Widget loaded")

const tags = [
"Complaint",
"Billing Issue",
"Technical Issue"
]

const container = document.getElementById("tags")

tags.forEach(tag => {

 const div = document.createElement("div")

 div.className="tag"
 div.innerText = tag

 container.appendChild(div)

})

</script>

</body>
</html>
